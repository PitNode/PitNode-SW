<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>PitNode</title>

  <!-- Pico.css -->
  <link rel="stylesheet" href="/static/pico.min.css">
  <link rel="stylesheet" href="/static/user.css">

  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="container">
  <img src="/static/PitNode_Logo_Master_black_250_x_100.png" alt="PitNode" style="height:4rem; display:block; margin:auto;">
</header>

<!-- ================= MENU ================= -->
<nav class="container">
  <ul>
    <li><a href="#">Dashboard</a></li>
    <li><a href="#">Settings</a></li>
  </ul>
</nav>

<!-- ================= MAIN ================= -->
<main class="container">

  <section id="channels"></section>

  <template id="channel-template">
    <article>
      <header class="ch-title"></header>

      <p>IST: <strong class="ch-temp"></strong></p>

      <p>
        SOLL: <output class="ch-target"></output> °C
        <input type="range" min="0" max="150" class="ch-slider">
        <button class="alarm-btn" disabled>Confirm alarm</button>
      </p>
    </article>
  </template>

</main>

<!-- ================= FOOTER ================= -->
<footer class="container">
  <small>
    © PitNode ·
    <a href="https://www.pitnode.de" target="_blank">
      www.pitnode.de
    </a>
  </small>
</footer>

<script src="/app.js"></script>

</body>
</html>
